<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Portfolio</title>
    <style>
        :root {
            --primary: #2d3436;
            --accent: #0984e3;
            --light: #f5f6fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            color: var(--primary);
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Top Section: Photo and Intro */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 40px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .profile-img {
            width: 200px;
            height: 200px;
            border-radius: 10px;
            object-fit: cover;
            border: 4px solid var(--accent);
        }

        .intro-text h1 {
            margin: 0;
            font-size: 2.5rem;
            color: var(--accent);
        }

        .intro-text .grade {
            font-weight: bold;
            color: #636e72;
            margin-bottom: 15px;
        }

        /* Expandable Box Section */
        .works-dropdown {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .works-button {
            width: 100%;
            padding: 20px;
            background: var(--accent);
            color: white;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            transition: background 0.3s;
        }

        .works-button:hover {
            background: #0773c5;
        }

        .content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
            padding: 0 20px;
        }

        .content.active {
            max-height: 1000px; /* Large enough to show content */
            padding: 20px;
        }

        .term-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }

        .term-card {
            background: #f1f2f6;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid var(--accent);
        }

        .term-card h3 {
            margin-top: 0;
            color: var(--accent);
        }

        /* Mobile responsiveness */
        @media (max-width: 600px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>

<script>
    function toggleWorks() {
        const content = document.getElementById('worksContent');
        content.classList.toggle('active');
        
        const button = document.querySelector('.works-button');
        if (content.classList.contains('active')) {
            button.innerText = 'Hide My Coursework ↑';
        } else {
            button.innerText = 'View My Coursework ↓';
        }
    }
</script>
