<!DOCTYPE html>
<html>
<head>
    <title>Lists and Tables Notes</title>
    <style>
        /* CSS FOR TABLES 
           - Use the border property to define table borders.
           - border-collapse: collapse; prevents double borders.
           - padding: adds space between content and border.
           - text-align: left; aligns content to the left.
        */
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
        }
        th, td {
            padding: 15px;
            text-align: left;
        }
        /* border-spacing: specifies the space between cells. */
        table.spaced {
            border-spacing: 30px;
        }
    </style>
</head>
<body>

    <ul style="list-style-type: square;">
        <li>Coffee</li>
        <li>Tea</li>
        <li>Milk</li>
    </ul>

    <ol type="I">
        <li>First Item</li>
        <li>Second Item</li>
    </ol>

    <dl>
        <dt>Coffee</dt>
        <dd>- black hot drink</dd>
        <dt>Milk</dt>
        <dd>- white cold drink</dd>
    </dl>

    <table>
        <tr>
            <th>Firstname</th>
            <th>Lastname</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Jill</td>
            <td>Smith</td>
            <td>50</td>
        </tr>
    </table>

    <table>
        <tr>
            <th colspan="2">Name</th> <th>Age</th>
        </tr>
        <tr>
            <td>Bill</td>
            <td>Gates</td>
            <td>65</td>
        </tr>
    </table>

    <table>
        <caption>Monthly Savings</caption>
        <tr>
            <th>Month</th>
            <th>Savings</th>
        </tr>
        <tr>
            <td>January</td>
            <td>$100</td>
        </tr>
    </table>

</body>
</html>
