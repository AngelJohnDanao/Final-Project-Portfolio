<!DOCTYPE html>
<html>
<head>
    <title>Success!</title>
    <style>
        body { 
            font-family: Arial; 
            text-align: center; 
            padding-top: 150px; 
            margin: 0;
            background-color: #e8f8f5; 
            background-image: url('https://png.pngtree.com/background/20250128/original/pngtree-top-view-of-kitchen-utensils-on-a-textured-classic-blue-background-picture-image_13488579.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .msg-box { 
            border: 2px dashed #000000; 
            padding: 40px; 
            display: inline-block; 
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border-radius: 15px;
            max-width: 80%;
        }

        h1 {
            color: #000000;
            margin-top: 0;
        }

        p {
            color: #000000;
            font-size: 18px;
        }

        a {
            display: inline-block;
            color: #ffffff;
            background-color: #000000;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            padding: 12px 25px; 
            border-radius: 5px;
            transition: 0.3s;
        }

        a:hover {
            background-color: #333333;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="msg-box">
        <h1>Thank You!</h1>
        <p>Your kitchen appliance has been added to your shopping bag.</p>
        <p>Check your email for the next steps.</p>
        <a href="index.html">Back to Home</a>
    </div>
</body>
</html>
