<!DOCTYPE html>
<html>
<head>
    <title>Forms and Multimedia Notes</title>
    <style>
        /* Form elements are inline by default; using blocks or margins helps layout. */
        form {
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <form>
        <label for="fname">First name:</label><br>
        <input type="text" id="fname" name="fname" value="John"><br>
        
        <label for="pwd">Password:</label><br>
        <input type="password" id="pwd" name="pwd"><br>

        <p>Choose your gender:</p>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label><br>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>

        <p>Vehicle Ownership:</p>
        <input type="checkbox" id="vehicle1" name="vehicle1" value="Bike">
        <label for="vehicle1"> I have a bike</label>

        <input type="submit" value="Submit">
    </form>

    <label for="cars">Choose a car:</label>
    <select id="cars" name="cars">
        <option value="volvo">Volvo</option>
        <option value="saab">Saab</option>
        <option value="fiat" selected>Fiat</option> </select>

    <p>Feedback:</p>
    <textarea name="message" rows="4" cols="30">The cat was playing in the garden.</textarea>

    <h3>Video Example</h3>
    <video width="320" height="240" controls>
        <source src="movie.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <h3>Audio Example</h3>
    <audio controls>
        <source src="horse.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <h3>Iframe Example</h3>
    <iframe src="https://www.w3schools.com" title="W3Schools Tutorial" width="300" height="200"></iframe>

</body>
</html>
