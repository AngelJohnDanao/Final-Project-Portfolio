<!DOCTYPE html>
<html>
<head>
    <title>Refrigerator Gallery</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0; 
            background-color: #f8f9fa; 
        }

        header {
            background: linear-gradient(135deg, #2c3e50, #000000);
            color: #f1c40f; 
            padding: 40px 0;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .gallery { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            padding: 20px; 
            gap: 20px;
        }

        .product { 
            background: white;
            border: none;
            border-top: 5px solid #f39c12; 
            border-radius: 10px;
            margin: 10px; 
            padding: 20px; 
            width: 220px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .product img {
            width: 100%;       
            height: 180px;      
            object-fit: contain; 
            border-radius: 5px;
            background-color: #ecf0f1;
            margin-bottom: 15px;
        }

        .product p {
            color: #2c3e50;
            font-weight: bold;
            margin: 10px 0;
        }

        .price { 
            color: #e74c3c; 
            font-size: 1.2rem;
            display: block;
            margin-bottom: 15px;
        }

        .btn {
            background-color: #2c3e50;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
            transition: background 0.3s;
            margin-top: auto;
        }

        .btn:hover {
            background-color: #f39c12; 
        }
    </style>
</head>
<body>

    <header>
        <h1>PREMIUM REFRIGERATOR SALE</h1>
        <p style="color: white;">Upgrade your kitchen with style</p>
    </header>

    <div class="gallery">
        <div class="product">
            <img src="https://shop.union.ph/cdn/shop/products/UGR-50-front-open_2048x2048.jpg?v=1689046166" alt="Smart Ref">
            <p>Smart Fridge v2</p>
            <span class="price">$1,800</span>
            <a href="description.html" class="btn">View Details</a>
        </div>

        <div class="product">
            <img src="https://myhanabishi.com/cdn/shop/files/HASREF-35SS.jpg?v=1722220938" alt="Mini Ref">
            <p>Mini Chill Box</p>
            <span class="price">$250</span>
            <a href="#" class="btn">Out of Stock</a>
        </div>

        <div class="product">
            <img src="https://i0.wp.com/jnrappliances.com.ph/wp-content/uploads/2021/10/WHIRLPOOL-6WS21NIHGG-21-cu.ft_.-Inverter-Side-by-Side-Refrigerator-2.png?fit=779%2C774&ssl=1" alt="Side by Side">
            <p>Side-by-Side Pro</p>
            <span class="price">$1,500</span>
            <a href="#" class="btn">Out of Stock</a>
        </div>

        <div class="product" style="border-top-color: #e74c3c;"> 
            <img src="https://i0.wp.com/jnrappliances.com.ph/wp-content/uploads/2021/10/WHIRLPOOL-6WS21NIHGG-21-cu.ft_.-Inverter-Side-by-Side-Refrigerator-2.png?fit=779%2C774&ssl=1" alt="French Door">
            <p>Luxury French Door</p>
            <span class="price">$2,200</span>
            <a href="#" class="btn">Out of Stock</a>
        </div>

        <div class="product">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTMo0duUB7ZSnx4guacOLpg80hQ_ayijJS0TQ&s" alt="Wine Cooler">
            <p>Digital Wine Cooler</p>
            <span class="price">$450</span>
            <a href="#" class="btn">Out of Stock</a>
        </div>
    </div>

</body>
</html>
