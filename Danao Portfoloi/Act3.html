<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figma Shape Navigator</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #f6e8e6;
            font-family: 'Georgia', serif;
        }

        .container {
            width: 100vw;
            height: 100vh;
            background-color: #f6e8e6; 
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .active { display: flex; }

        .btn {
            position: absolute;
            background: black;
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .btn:hover { background: #444; }
        .home-btn { top: 30px; left: 30px; }
        .back-btn { bottom: 30px; right: 30px; }

        .home-nav {
            display: flex;
            gap: 30px;
            align-items: flex-end;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            text-decoration: none;
            color: black;
            font-size: 10px;
        }
        .nav-item:hover { transform: scale(1.1); }
        .nav-item span { margin-top: 8px; }

        .image-map-bar {
            width: 600px;
            height: 180px;
            background: linear-gradient(to right, #9e9e9e, #333);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 2px solid #555;
            padding: 0 20px;
        }
        .map-shape {
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
        }
        .map-shape:hover {
            transform: scale(1.15);
            filter: brightness(1.3);
        }
        .instruction {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        .square { 
            width: 150px; 
            height: 150px; 
            background: blue; 
            border: 2px solid black; 
        }
        .circle { 
            width: 150px; 
            height: 150px; 
            background: #ffcc00; 
            border-radius: 50%; 
            border: 2px solid black; 
        }
        .triangle { 
            width: 0; height: 0; 
            border-left: 75px solid transparent; 
            border-right: 75px solid transparent; 
            border-bottom: 150px solid red; 
            filter: drop-shadow(0 0 1px black) drop-shadow(0 0 1px black); 
        }

        .sq-sm { width: 60px; height: 60px; background: blue; border: 2px solid black; }
        .cir-sm { width: 60px; height: 60px; background: #ffcc00; border-radius: 50%; border: 2px solid black; }
        .tri-sm { 
            border-left: 40px solid transparent; 
            border-right: 40px solid transparent; 
            border-bottom: 60px solid red; 
            filter: drop-shadow(0 0 1px black);
        }

            <div class="map-shape square" style="width:100px; height:100px;" onclick="showPage('page-square')"></div>
            <div class="map-shape circle" style="width:100px; height:100px;" onclick="showPage('page-circle')"></div>

        <h1>Circle</h1>
        <button class="btn back-btn" onclick="showPage('page-map')">BACK</button>

    <div id="page-triangle" class="container">
        <button class="btn home-btn" onclick="showPage('page-home')">HOME</button>
        <div class="triangle"></div>
        <h1>Triangle</h1>
        <button class="btn back-btn" onclick="showPage('page-map')">BACK</button>
    </div>

    <script>
        function showPage(pageId) {
            const pages = document.querySelectorAll('.container');
            pages.forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
    </script>
