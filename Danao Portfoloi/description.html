<!DOCTYPE html>
<html>
<head>
    <title>Product Details</title>
    <style>
        body { 
            font-family: Arial; 
            margin: 0; 
            background: #f4f7f6; 
        }

        .navbar { 
            background-color: #2c3e50; 
            padding: 15px; 
        }

        .navbar a { color: white;
            margin: 0 15px; 
            text-decoration: none; 
        }

        .product-box { background: white; 
            max-width: 800px; 
            margin: 50px auto;
            display: flex; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(8, 8, 8, 0.3); 
        }

        .image-side { 
            background: #ecf0f1; 
            padding: 40px; flex: 1; 
        }

        .info-side { 
            padding: 40px; 
            flex: 1; 
        }

        .buy-btn { 
            background: #27ae60; 
            color: white; padding: 20px; 
            text-decoration: none; display: block; 
            text-align: center; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 18px; 
            margin-top: 30px; 
        }
        .buy-btn:hover { background: #219150; }
    </style>
</head>
<body>
    <div class="navbar"><a href="index page.html">Home</a> <a href="category.html">Categories</a></div>
    <div class="product-box">
        <div class="image-side"><img src="https://shop.union.ph/cdn/shop/products/UGR-50-front-open_2048x2048.jpg?v=1689046166" width="100%"></div>
        <div class="info-side">
            <h2 style="color:#2c3e50;">Smart Refrigerator v2</h2>
            <p>Featuring dual-cooling technology, a smart touchscreen, and interior cameras to check your food from your phone.</p>
            <h3 style="color:#e74c3c;">Sale Price: $1,800.00</h3>
